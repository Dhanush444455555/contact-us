<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contact Us</title>
  <!-- React from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX transform in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
  /* Copied and adjusted styles from previous ContactUs.css */
  body {
    margin: 0;
    background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
    color: white;
    font-family: Arial, sans-serif;
  }
  .contact-us-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 50px 20px;
  }
  .contact-us-header { text-align: center; margin-bottom: 50px; }
  .contact-title { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(45deg, #00ff00, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .contact-subtitle { font-size: 1.2rem; opacity: 0.8; }
  .contact-content { display: flex; flex-wrap: wrap; gap: 50px; justify-content: space-between; }
  .contact-info, .contact-form { flex: 1; min-width: 300px; }
  .info-item { margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; backdrop-filter: blur(10px); transition: transform 0.3s ease; }
  .info-item h3 { margin-bottom: 10px; color: #00ff00; }
  .social-links { display: flex; gap: 20px; margin-top: 30px; }
  .social-link { color: white; text-decoration: none; padding: 10px 20px; border: 2px solid #00ff00; border-radius: 25px; transition: all 0.3s ease; }
  .social-link:hover { background: #00ff00; transform: scale(1.05); }
  .contact-form { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
  .form-group input, .form-group textarea { width: 100%; padding: 12px; border: none; border-radius: 5px; background: rgba(255,255,255,0.2); color: white; font-size: 1rem; transition: all 0.3s ease; }
  .form-group input:focus, .form-group textarea:focus { outline: none; animation: inputFocus 0.5s ease-out; }
  .submit-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #00ff00, #00ffff); color: black; border: none; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  @keyframes inputFocus { 0% { box-shadow: 0 0 0 0 rgba(0,255,0,0.7); } 100% { box-shadow: 0 0 0 10px rgba(0,255,0,0); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideLeft { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateY(0);}40%{transform:translateY(-10px);}60%{transform:translateY(-5px);} }
  @keyframes pulse { 0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);} }
  .animate-fade-in{animation:fadeIn 1s ease-out;} .animate-slide-up{animation:slideUp 1s ease-out 0.3s both;} .animate-slide-left{animation:slideLeft 1s ease-out 0.5s both;} .animate-slide-right{animation:slideRight 1s ease-out 0.7s both;} .animate-bounce{animation:bounce 2s infinite;} .animate-pulse{animation:pulse 2s infinite;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    function ContactUs() {
      const [formData, setFormData] = useState({name:'',email:'',message:''});
      const handleChange = e => setFormData({...formData,[e.target.name]:e.target.value});
      const handleSubmit = e => { e.preventDefault(); console.log('Form submitted:',formData); setFormData({name:'',email:'',message:''}); };
      return (
        <div className="contact-us-container">
          <div className="contact-us-header">
            <h1 className="contact-title animate-fade-in">Contact Us</h1>
            <p className="contact-subtitle animate-slide-up">Get in touch with us for any inquiries or collaborations</p>
          </div>
          <div className="contact-content">
            <div className="contact-info animate-slide-left">
              <div className="info-item"><h3>Email</h3><p>info@nmit.edu</p></div>
              <div className="info-item"><h3>Phone</h3><p>+91 123 456 7890</p></div>
              <div className="info-item"><h3>Address</h3><p>Siddaganga Institute of Technology<br/>Tumkur, Karnataka - 572103</p></div>
              <div className="social-links">
                <a href="#" className="social-link animate-bounce">Facebook</a>
                <a href="#" className="social-link animate-bounce">Twitter</a>
                <a href="#" className="social-link animate-bounce">LinkedIn</a>
              </div>
            </div>
            <form className="contact-form animate-slide-right" onSubmit={handleSubmit}>
              <div className="form-group">
                <label htmlFor="name">Name</label>
                <input type="text" id="name" name="name" value={formData.name} onChange={handleChange} required className="animate-input-focus" />
              </div>
              <div className="form-group">
                <label htmlFor="email">Email</label>
                <input type="email" id="email" name="email" value={formData.email} onChange={handleChange} required className="animate-input-focus" />
              </div>
              <div className="form-group">
                <label htmlFor="message">Message</label>
                <textarea id="message" name="message" value={formData.message} onChange={handleChange} required rows="5" className="animate-input-focus"></textarea>
              </div>
              <button type="submit" className="submit-btn animate-pulse">Send Message</button>
            </form>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<ContactUs />);
  </script>
</body>
</html>
